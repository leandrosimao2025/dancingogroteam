<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia — Controle de Alunos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --accent: #c8f542;
    --accent2: #42f5c8;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5252;
    --warn: #ffb300;
    --ok: #69f0ae;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; position: fixed; height: 100vh; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--accent); margin-bottom: 1.5rem; letter-spacing: -0.5px; }
  .logo span { color: var(--text); }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; width: 100%; text-align: left; transition: all 0.15s; }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #000; font-weight: 500; }
  .nav-icon { width: 18px; font-size: 1rem; }
  .main { margin-left: 220px; flex: 1; padding: 2rem; }
  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .page-title { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .page-title span { color: var(--accent); }

  /* CARDS DASHBOARD */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; }
  .stat-value.green { color: var(--ok); }
  .stat-value.yellow { color: var(--warn); }
  .stat-value.red { color: var(--danger); }
  .stat-value.accent { color: var(--accent); }

  /* BTN */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #b8e030; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { padding: 12px 16px; text-align: left; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  td { padding: 12px 16px; font-size: 0.875rem; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--surface2); }

  /* STATUS BADGE */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 500; }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-ok { background: rgba(105,240,174,0.15); color: var(--ok); }
  .badge-ok::before { background: var(--ok); }
  .badge-warn { background: rgba(255,179,0,0.15); color: var(--warn); }
  .badge-warn::before { background: var(--warn); }
  .badge-red { background: rgba(255,82,82,0.15); color: var(--danger); }
  .badge-red::before { background: var(--danger); }
  .badge-blue { background: rgba(66,245,200,0.15); color: var(--accent2); font-size: 0.7rem; padding: 2px 8px; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filters input, .filters select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; outline: none; }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters input { flex: 1; min-width: 200px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1.2rem; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; outline: none; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }

  /* PAGAMENTOS MODAL */
  .pag-list { margin: 1rem 0; display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .pag-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 8px; padding: 10px 14px; font-size: 0.875rem; }
  .pag-date { color: var(--muted); font-size: 0.8rem; }
  .pag-valor { font-weight: 500; }

  /* FILIAIS */
  .filial-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .filial-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 8px; padding: 10px 14px; }
  .filial-name { font-size: 0.9rem; }
  .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* INADIMPLENTES */
  .inadimplentes-list { display: flex; flex-direction: column; gap: 8px; }
  .inad-item { background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.2); border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }

  @media (max-width: 768px) {
    .sidebar { width: 60px; padding: 1rem 0.5rem; }
    .nav-btn span { display: none; }
    .logo { font-size: 0; }
    .logo::after { content: 'A'; font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .main { margin-left: 60px; padding: 1rem; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Academia<span>.</span></div>
    <button class="nav-btn active" onclick="showPage('dashboard', this)">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </button>
    <button class="nav-btn" onclick="showPage('alunos', this)">
      <span class="nav-icon">👥</span><span>Alunos</span>
    </button>
    <button class="nav-btn" onclick="showPage('financeiro', this)">
      <span class="nav-icon">💰</span><span>Financeiro</span>
    </button>
    <button class="nav-btn" onclick="showPage('filiais', this)">
      <span class="nav-icon">🏢</span><span>Filiais</span>
    </button>
  </aside>

  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <h1 class="page-title">Dashboard <span>Overview</span></h1>
      </div>
      <div class="cards-grid" id="dash-cards"></div>
      <h2 style="font-size:1rem;margin-bottom:1rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;">Inadimplentes</h2>
      <div class="inadimplentes-list" id="dash-inad"></div>
    </div>

    <!-- ALUNOS -->
    <div id="page-alunos" class="page">
      <div class="page-header">
        <h1 class="page-title">Alunos</h1>
        <button class="btn btn-primary" onclick="openModal('modal-aluno')">+ Novo Aluno</button>
      </div>
      <div class="filters">
        <input type="text" id="filtro-nome" placeholder="🔍  Buscar por nome..." oninput="renderAlunos()">
        <select id="filtro-filial" onchange="renderAlunos()"><option value="">Todas as filiais</option></select>
        <select id="filtro-grad" onchange="renderAlunos()">
          <option value="">Todas as graduações</option>
          <option>Branca</option><option>Cinza</option><option>Azul</option><option>Roxa</option><option>Marrom</option><option>Preta</option><option>Coral</option><option>Vermelha</option>
        </select>
        <select id="filtro-status" onchange="renderAlunos()">
          <option value="">Todos os status</option>
          <option value="ativo">Ativo</option>
          <option value="pendente">Pendente</option>
          <option value="inativo">Inativo</option>
        </select>
        <select id="filtro-tipo" onchange="renderAlunos()">
          <option value="">Todos os tipos</option>
          <option value="instrutor">Instrutor</option>
          <option value="atleta">Atleta</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th><th>Graduação</th><th>Tipo</th><th>Filial</th><th>Status</th><th>Mensalidade</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-alunos"></tbody>
        </table>
      </div>
    </div>

    <!-- FINANCEIRO -->
    <div id="page-financeiro" class="page">
      <div class="page-header">
        <h1 class="page-title">Financeiro</h1>
      </div>
      <div class="cards-grid" id="fin-cards"></div>
      <h2 style="font-size:1rem;margin-bottom:1rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;">Histórico de pagamentos</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Aluno</th><th>Filial</th><th>Data</th><th>Valor</th><th>Status</th></tr>
          </thead>
          <tbody id="tabela-pagamentos"></tbody>
        </table>
      </div>
    </div>

    <!-- FILIAIS -->
    <div id="page-filiais" class="page">
      <div class="page-header">
        <h1 class="page-title">Filiais</h1>
        <button class="btn btn-primary" onclick="openModal('modal-filial')">+ Nova Filial</button>
      </div>
      <div class="filial-list" id="lista-filiais"></div>
    </div>

  </main>
</div>

<!-- MODAL ALUNO -->
<div class="modal-overlay" id="modal-aluno">
  <div class="modal">
    <h3 id="modal-aluno-title">Novo Aluno</h3>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nome completo</label>
        <input type="text" id="a-nome" placeholder="Nome do aluno">
      </div>
      <div class="form-group">
        <label>Graduação</label>
        <select id="a-grad">
          <option>Branca</option><option>Cinza</option><option>Azul</option><option>Roxa</option><option>Marrom</option><option>Preta</option><option>Coral</option><option>Vermelha</option>
        </select>
      </div>
      <div class="form-group">
        <label>Filial</label>
        <select id="a-filial"></select>
      </div>
      <div class="form-group">
        <label>Instrutor?</label>
        <select id="a-instrutor"><option value="nao">Não</option><option value="sim">Sim</option></select>
      </div>
      <div class="form-group">
        <label>Atleta?</label>
        <select id="a-atleta"><option value="nao">Não</option><option value="sim">Sim</option></select>
      </div>
      <div class="form-group">
        <label>Status financeiro</label>
        <select id="a-status"><option value="ativo">Ativo</option><option value="pendente">Pendente</option><option value="inativo">Inativo</option></select>
      </div>
      <div class="form-group">
        <label>Mensalidade (R$)</label>
        <input type="number" id="a-mensalidade" placeholder="0,00" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-aluno')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAluno()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PAGAMENTO -->
<div class="modal-overlay" id="modal-pagamento">
  <div class="modal">
    <h3 id="pag-nome-title">Pagamentos — Aluno</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="pag-data">
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="pag-valor" placeholder="0,00">
      </div>
    </div>
    <button class="btn btn-primary btn-sm" style="margin-top:0.75rem" onclick="registrarPagamento()">+ Registrar pagamento</button>
    <div class="pag-list" id="pag-list"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-pagamento')">Fechar</button>
    </div>
  </div>
</div>

<!-- MODAL FILIAL -->
<div class="modal-overlay" id="modal-filial">
  <div class="modal" style="max-width:360px">
    <h3>Nova Filial</h3>
    <div class="form-group" style="margin-top:1rem">
      <label>Nome da filial</label>
      <input type="text" id="f-nome" placeholder="Ex: Unidade Centro">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-filial')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarFilial()">Salvar</button>
    </div>
  </div>
</div>

<script>
let editandoId = null;
let pagAlunoId = null;

// DATA
function getData() {
  return {
    alunos: JSON.parse(localStorage.getItem('academia_alunos') || '[]'),
    filiais: JSON.parse(localStorage.getItem('academia_filiais') || '["Sede Principal"]'),
    pagamentos: JSON.parse(localStorage.getItem('academia_pagamentos') || '[]'),
  };
}
function saveData(key, val) { localStorage.setItem('academia_' + key, JSON.stringify(val)); }

// NAV
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'alunos') renderAlunos();
  if (id === 'financeiro') renderFinanceiro();
  if (id === 'filiais') renderFiliais();
}

// MODALS
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-aluno') {
    if (!editandoId) {
      document.getElementById('modal-aluno-title').textContent = 'Novo Aluno';
      document.getElementById('a-nome').value = '';
      document.getElementById('a-mensalidade').value = '';
      document.getElementById('a-grad').value = 'Branca';
      document.getElementById('a-instrutor').value = 'nao';
      document.getElementById('a-atleta').value = 'nao';
      document.getElementById('a-status').value = 'ativo';
    }
    populateFilialSelect('a-filial');
  }
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  editandoId = null;
}

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); editandoId = null; });
});

// FILIAIS
function populateFilialSelect(sel) {
  const { filiais } = getData();
  const el = document.getElementById(sel);
  el.innerHTML = filiais.map(f => `<option>${f}</option>`).join('');
}

function salvarFilial() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) return alert('Informe o nome da filial.');
  const { filiais } = getData();
  if (filiais.includes(nome)) return alert('Filial já cadastrada.');
  filiais.push(nome);
  saveData('filiais', filiais);
  document.getElementById('f-nome').value = '';
  closeModal('modal-filial');
  renderFiliais();
  // update filtro
  updateFilialFiltro();
}

function renderFiliais() {
  const { filiais, alunos } = getData();
  const el = document.getElementById('lista-filiais');
  if (!filiais.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>Nenhuma filial cadastrada.</p></div>'; return; }
  el.innerHTML = filiais.map(f => {
    const count = alunos.filter(a => a.filial === f).length;
    return `<div class="filial-item">
      <div>
        <div class="filial-name">${f}</div>
        <div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${count} aluno(s)</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removerFilial('${f}')">Remover</button>
    </div>`;
  }).join('');
}

function removerFilial(nome) {
  if (!confirm(`Remover filial "${nome}"?`)) return;
  const { filiais } = getData();
  saveData('filiais', filiais.filter(f => f !== nome));
  renderFiliais();
  updateFilialFiltro();
}

function updateFilialFiltro() {
  const { filiais } = getData();
  const sel = document.getElementById('filtro-filial');
  const val = sel.value;
  sel.innerHTML = '<option value="">Todas as filiais</option>' + filiais.map(f => `<option ${val===f?'selected':''}>${f}</option>`).join('');
}

// ALUNOS
function salvarAluno() {
  const nome = document.getElementById('a-nome').value.trim();
  if (!nome) return alert('Informe o nome.');
  const { alunos } = getData();
  const novo = {
    id: editandoId || Date.now().toString(),
    nome,
    graduacao: document.getElementById('a-grad').value,
    filial: document.getElementById('a-filial').value,
    instrutor: document.getElementById('a-instrutor').value,
    atleta: document.getElementById('a-atleta').value,
    status: document.getElementById('a-status').value,
    mensalidade: parseFloat(document.getElementById('a-mensalidade').value) || 0,
  };
  if (editandoId) {
    const idx = alunos.findIndex(a => a.id === editandoId);
    alunos[idx] = novo;
  } else {
    alunos.push(novo);
  }
  saveData('alunos', alunos);
  closeModal('modal-aluno');
  renderAlunos();
  renderDashboard();
}

function editarAluno(id) {
  const { alunos } = getData();
  const a = alunos.find(x => x.id === id);
  if (!a) return;
  editandoId = id;
  document.getElementById('modal-aluno-title').textContent = 'Editar Aluno';
  populateFilialSelect('a-filial');
  document.getElementById('a-nome').value = a.nome;
  document.getElementById('a-grad').value = a.graduacao;
  document.getElementById('a-filial').value = a.filial;
  document.getElementById('a-instrutor').value = a.instrutor;
  document.getElementById('a-atleta').value = a.atleta;
  document.getElementById('a-status').value = a.status;
  document.getElementById('a-mensalidade').value = a.mensalidade;
  openModal('modal-aluno');
}

function excluirAluno(id) {
  if (!confirm('Excluir aluno?')) return;
  const { alunos } = getData();
  saveData('alunos', alunos.filter(a => a.id !== id));
  renderAlunos();
  renderDashboard();
}

function renderAlunos() {
  updateFilialFiltro();
  const { alunos } = getData();
  const nome = document.getElementById('filtro-nome').value.toLowerCase();
  const filial = document.getElementById('filtro-filial').value;
  const grad = document.getElementById('filtro-grad').value;
  const status = document.getElementById('filtro-status').value;
  const tipo = document.getElementById('filtro-tipo').value;

  let lista = alunos.filter(a => {
    if (nome && !a.nome.toLowerCase().includes(nome)) return false;
    if (filial && a.filial !== filial) return false;
    if (grad && a.graduacao !== grad) return false;
    if (status && a.status !== status) return false;
    if (tipo === 'instrutor' && a.instrutor !== 'sim') return false;
    if (tipo === 'atleta' && a.atleta !== 'sim') return false;
    return true;
  });

  const tbody = document.getElementById('tabela-alunos');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Nenhum aluno encontrado.</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(a => {
    const badgeCls = a.status === 'ativo' ? 'badge-ok' : a.status === 'pendente' ? 'badge-warn' : 'badge-red';
    const statusLabel = a.status === 'ativo' ? 'Ativo' : a.status === 'pendente' ? 'Pendente' : 'Inativo';
    const tags = [a.instrutor === 'sim' ? '<span class="badge badge-blue">Instrutor</span>' : '', a.atleta === 'sim' ? '<span class="badge badge-blue">Atleta</span>' : ''].filter(Boolean).join(' ');
    return `<tr>
      <td style="font-weight:500">${a.nome}</td>
      <td>${a.graduacao}</td>
      <td>${tags || '<span style="color:var(--muted);font-size:0.8rem">—</span>'}</td>
      <td>${a.filial || '—'}</td>
      <td><span class="badge ${badgeCls}">${statusLabel}</span></td>
      <td>R$ ${a.mensalidade.toFixed(2)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="abrirPagamentos('${a.id}')">💳 Pag.</button>
        <button class="btn btn-ghost btn-sm" onclick="editarAluno('${a.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="excluirAluno('${a.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

// PAGAMENTOS
function abrirPagamentos(id) {
  pagAlunoId = id;
  const { alunos } = getData();
  const a = alunos.find(x => x.id === id);
  document.getElementById('pag-nome-title').textContent = 'Pagamentos — ' + a.nome;
  document.getElementById('pag-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('pag-valor').value = a.mensalidade || '';
  renderPagList();
  openModal('modal-pagamento');
}

function renderPagList() {
  const { pagamentos, alunos } = getData();
  const lista = pagamentos.filter(p => p.alunoId === pagAlunoId).sort((a,b) => b.data.localeCompare(a.data));
  const el = document.getElementById('pag-list');
  if (!lista.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:1rem;font-size:0.875rem">Sem pagamentos registrados.</div>'; return; }
  el.innerHTML = lista.map(p => `
    <div class="pag-item">
      <div>
        <div class="pag-valor">R$ ${parseFloat(p.valor).toFixed(2)}</div>
        <div class="pag-date">${formatDate(p.data)}</div>
      </div>
      <span class="badge badge-ok">Recebido</span>
    </div>
  `).join('');
}

function registrarPagamento() {
  const data = document.getElementById('pag-data').value;
  const valor = parseFloat(document.getElementById('pag-valor').value);
  if (!data || !valor) return alert('Informe data e valor.');
  const { pagamentos, alunos } = getData();
  pagamentos.push({ id: Date.now().toString(), alunoId: pagAlunoId, data, valor });
  saveData('pagamentos', pagamentos);
  // atualizar status do aluno para ativo
  const idx = alunos.findIndex(a => a.id === pagAlunoId);
  if (idx >= 0) { alunos[idx].status = 'ativo'; saveData('alunos', alunos); }
  renderPagList();
  renderDashboard();
  renderAlunos();
}

function formatDate(d) {
  const [y,m,dia] = d.split('-');
  return `${dia}/${m}/${y}`;
}

// DASHBOARD
function renderDashboard() {
  const { alunos, pagamentos } = getData();
  const total = alunos.length;
  const instrutores = alunos.filter(a => a.instrutor === 'sim').length;
  const atletas = alunos.filter(a => a.atleta === 'sim').length;
  const inadimplentes = alunos.filter(a => a.status === 'pendente' || a.status === 'inativo');
  const mesAtual = new Date().toISOString().slice(0,7);
  const recebido = pagamentos.filter(p => p.data.slice(0,7) === mesAtual).reduce((s,p) => s + parseFloat(p.valor), 0);
  const esperado = alunos.filter(a => a.status !== 'inativo').reduce((s,a) => s + a.mensalidade, 0);

  document.getElementById('dash-cards').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total de alunos</div><div class="stat-value accent">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Instrutores</div><div class="stat-value" style="color:var(--accent2)">${instrutores}</div></div>
    <div class="stat-card"><div class="stat-label">Atletas</div><div class="stat-value" style="color:var(--accent2)">${atletas}</div></div>
    <div class="stat-card"><div class="stat-label">Inadimplentes</div><div class="stat-value red">${inadimplentes.length}</div></div>
    <div class="stat-card"><div class="stat-label">Receita esperada</div><div class="stat-value yellow">R$ ${esperado.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido este mês</div><div class="stat-value green">R$ ${recebido.toFixed(2)}</div></div>
  `;

  const inadEl = document.getElementById('dash-inad');
  if (!inadimplentes.length) {
    inadEl.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>Nenhum aluno inadimplente. Tudo em dia!</p></div>';
    return;
  }
  inadEl.innerHTML = inadimplentes.map(a => `
    <div class="inad-item">
      <div>
        <div style="font-weight:500">${a.nome}</div>
        <div style="font-size:0.8rem;color:var(--muted)">${a.filial} · ${a.graduacao}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span>R$ ${a.mensalidade.toFixed(2)}</span>
        <span class="badge ${a.status==='pendente'?'badge-warn':'badge-red'}">${a.status==='pendente'?'Pendente':'Inativo'}</span>
        <button class="btn btn-ghost btn-sm" onclick="abrirPagamentos('${a.id}')">Registrar pag.</button>
      </div>
    </div>
  `).join('');
}

// FINANCEIRO
function renderFinanceiro() {
  const { alunos, pagamentos } = getData();
  const mesAtual = new Date().toISOString().slice(0,7);
  const recebido = pagamentos.filter(p => p.data.slice(0,7) === mesAtual).reduce((s,p) => s + parseFloat(p.valor), 0);
  const esperado = alunos.filter(a => a.status !== 'inativo').reduce((s,a) => s + a.mensalidade, 0);
  const totalPag = pagamentos.reduce((s,p) => s + parseFloat(p.valor), 0);

  document.getElementById('fin-cards').innerHTML = `
    <div class="stat-card"><div class="stat-label">Esperado este mês</div><div class="stat-value yellow">R$ ${esperado.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido este mês</div><div class="stat-value green">R$ ${recebido.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">A receber</div><div class="stat-value red">R$ ${Math.max(0, esperado - recebido).toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Total histórico</div><div class="stat-value accent">R$ ${totalPag.toFixed(2)}</div></div>
  `;

  const sorted = [...pagamentos].sort((a,b) => b.data.localeCompare(a.data));
  const tbody = document.getElementById('tabela-pagamentos');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem">Nenhum pagamento registrado.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map(p => {
    const aluno = alunos.find(a => a.id === p.alunoId);
    return `<tr>
      <td style="font-weight:500">${aluno ? aluno.nome : 'Aluno removido'}</td>
      <td>${aluno ? aluno.filial : '—'}</td>
      <td>${formatDate(p.data)}</td>
      <td>R$ ${parseFloat(p.valor).toFixed(2)}</td>
      <td><span class="badge badge-ok">Recebido</span></td>
    </tr>`;
  }).join('');
}

// INIT
renderDashboard();
updateFilialFiltro();
</script>
</body>
</html>
